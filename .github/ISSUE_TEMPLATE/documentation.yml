name: Documentation
description: Report missing, unclear, or incorrect documentation
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Help us improve Projonexa documentation — README, `/docs`, code comments, or GitHub guides.

  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation type
      options:
        - README.md
        - docs/ folder
        - CONTRIBUTING / SECURITY / SUPPORT
        - Code comments / inline docs
        - GitHub templates or workflows
        - Brand guidelines
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: File or page location
      placeholder: e.g. docs/ARCHITECTURE.md, /contact page copy
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What is wrong or missing?
      placeholder: Describe what's unclear, outdated, or absent
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: How should the documentation be updated?

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgements
      options:
        - label: I agree to follow the Projonexa Code of Conduct
          required: true
