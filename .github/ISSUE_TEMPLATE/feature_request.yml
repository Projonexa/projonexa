name: Feature Request
description: Suggest an improvement for the Projonexa website or open-source repo
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Share your idea for improving the Projonexa **website or repository**.

        > **Need a project built?** → [Contact Projonexa](https://projonexa.com/contact) for final year projects, MVPs, and research work.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve? Who benefits (students, visitors, contributors)?
      placeholder: e.g. Students on mobile need a clearer way to compare pricing plans...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the feature, page, or change you'd like to see
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Website UI/UX
        - New page or section
        - Documentation
        - SEO / performance / accessibility
        - Developer experience / tooling
        - GitHub / community
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - Nice to have
        - Would improve experience
        - Important for launch or growth
        - Critical
    validations:
      required: true

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request for this feature
          required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Acknowledgements
      options:
        - label: I have searched existing issues and discussions
          required: true
        - label: I agree to follow the Projonexa Code of Conduct
          required: true
