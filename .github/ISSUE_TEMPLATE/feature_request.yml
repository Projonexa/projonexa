name: Feature Request
description: Suggest an improvement for the Projonexa website or platform
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Share your idea for improving Projonexa. For **client project requests** (final year projects, MVPs), please use [Contact](https://projonexa.com/contact) instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What problem does this solve? Who benefits?
      placeholder: e.g. Students need a clearer pricing comparison on mobile...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the feature or change you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Website UI/UX
        - New page or section
        - Documentation
        - SEO / performance
        - Developer experience
        - Other
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the Projonexa Code of Conduct
          required: true
